<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{% endblock %} — Казанское Такси</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚖</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1E2535;
      color: #C2CEDF;
      font-size: 15px;
      line-height: 1.7;
    }
    .legal-header {
      background: rgba(20,28,50,0.98);
      border-bottom: 1px solid rgba(245,184,0,0.3);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .legal-header-logo {
      font-size: 15px;
      font-weight: 700;
      color: #F5B800;
      text-decoration: none;
    }
    .legal-header a {
      font-size: 13px;
      color: #8998B0;
      text-decoration: none;
    }
    .legal-header a:hover { color: #F5B800; }

    .legal-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .legal-date {
      font-size: 13px;
      color: #8998B0;
      margin-bottom: 32px;
    }
    h2 {
      font-size: 17px;
      font-weight: 700;
      color: #F5B800;
      margin-top: 32px;
      margin-bottom: 10px;
    }
    h3 {
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
      margin-top: 20px;
      margin-bottom: 6px;
    }
    p { margin-bottom: 12px; }
    ul, ol {
      padding-left: 22px;
      margin-bottom: 12px;
    }
    li { margin-bottom: 6px; }
    a { color: #F5B800; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .legal-box {
      background: rgba(245,184,0,0.07);
      border: 1px solid rgba(245,184,0,0.25);
      border-radius: 10px;
      padding: 16px 20px;
      margin: 20px 0;
      font-size: 14px;
    }
    .legal-box strong { color: #F5B800; }

    .req-table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 14px;
    }
    .req-table td {
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      vertical-align: top;
    }
    .req-table tr:nth-child(odd) td { background: rgba(255,255,255,0.03); }
    .req-table td:first-child {
      color: #8998B0;
      white-space: nowrap;
      width: 180px;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 28px 0;
    }

    @media (max-width: 480px) {
      .req-table td:first-child { width: auto; white-space: normal; }
    }
  </style>
</head>
<body>

<header class="legal-header">
  <a href="/" class="legal-header-logo">🚖 Казанское Такси</a>
  <a href="/">← На главную</a>
</header>

<div class="legal-wrap">
  {% block content %}{% endblock %}
</div>

</body>
</html>
