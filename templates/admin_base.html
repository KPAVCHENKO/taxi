<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Админка{% endblock %} — Такси Казанское</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1a1d2e;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo .logo-icon { font-size: 24px; }
    .sidebar-logo .logo-title { font-size: 15px; font-weight: 700; color: #a78bfa; margin-top: 4px; }
    .sidebar-logo .logo-sub { font-size: 11px; color: #64748b; margin-top: 2px; }

    .sidebar-nav { flex: 1; padding: 16px 0; }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.15s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: rgba(167,139,250,0.12);
      color: #a78bfa;
      border-right: 3px solid #a78bfa;
    }
    .sidebar-nav .nav-icon { font-size: 16px; }

    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebar-footer a { color: #64748b; font-size: 13px; text-decoration: none; }
    .sidebar-footer a:hover { color: #94a3b8; }

    /* ── Main ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      background: #1a1d2e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar h1 { font-size: 20px; font-weight: 600; color: #e2e8f0; }
    .top-bar .top-actions { display: flex; gap: 8px; }

    .content { flex: 1; padding: 28px; overflow-y: auto; }

    /* ── Cards & Tables ── */
    .card {
      background: #1a1d2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(255,255,255,0.04); }
    th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-new { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge-accepted { background: rgba(16,185,129,0.2); color: #34d399; }
    .badge-completed { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .badge-pending { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .badge-approved { background: rgba(16,185,129,0.2); color: #34d399; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary-sm { background: #7c6fff; color: white; }
    .btn-primary-sm:hover { background: #6c5fff; }
    .btn-success { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .btn-success:hover { background: rgba(16,185,129,0.35); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .btn-danger:hover { background: rgba(239,68,68,0.3); }
    .btn-warning { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .btn-warning:hover { background: rgba(245,158,11,0.3); }
    .btn-ghost { background: rgba(255,255,255,0.07); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }

    /* ── Forms ── */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .form-row input, .form-row select {
      flex: 1;
      min-width: 160px;
      padding: 9px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
    }
    .form-row input::placeholder { color: #475569; }

    /* ── Filters ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar a {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      text-decoration: none;
      background: rgba(255,255,255,0.06);
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.15s;
    }
    .filter-bar a.active, .filter-bar a:hover {
      background: rgba(124,111,255,0.2);
      color: #a78bfa;
      border-color: rgba(124,111,255,0.4);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #475569;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Alert ── */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .alert-info { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo .logo-title, .sidebar-logo .logo-sub,
      .sidebar-nav a span:not(.nav-icon), .sidebar-footer { display: none; }
      .sidebar-nav a { justify-content: center; padding: 12px; }
    }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🚖</div>
    <div class="logo-title">Такси</div>
    <div class="logo-sub">Казанский район</div>
  </div>
  <div class="sidebar-nav">
    <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint in ('admin_dashboard',) else '' }}">
      <span class="nav-icon">📊</span> <span>Дашборд</span>
    </a>
    <a href="{{ url_for('admin_orders') }}" class="{{ 'active' if request.endpoint == 'admin_orders' else '' }}">
      <span class="nav-icon">📋</span> <span>Заказы</span>
    </a>
    <a href="{{ url_for('admin_drivers') }}" class="{{ 'active' if request.endpoint == 'admin_drivers' else '' }}">
      <span class="nav-icon">🚗</span> <span>Водители</span>
    </a>
    <a href="{{ url_for('admin_reviews') }}" class="{{ 'active' if request.endpoint == 'admin_reviews' else '' }}">
      <span class="nav-icon">⭐</span> <span>Отзывы</span>
    </a>
    <a href="{{ url_for('admin_dispatcher') }}" target="_blank">
      <span class="nav-icon">📱</span> <span>Приложение</span>
    </a>
    <a href="{{ url_for('set_webhook') }}" target="_blank">
      <span class="nav-icon">🤖</span> <span>Webhook</span>
    </a>
    <a href="{{ url_for('index') }}" target="_blank">
      <span class="nav-icon">🌐</span> <span>Сайт</span>
    </a>
  </div>
  <div class="sidebar-footer">
    <a href="{{ url_for('admin_logout') }}">⬅ Выйти</a>
  </div>
</nav>

<div class="main-area">
  <div class="top-bar">
    <h1>{% block page_title %}Панель управления{% endblock %}</h1>
    <div class="top-actions">{% block top_actions %}{% endblock %}</div>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

</body>
</html>
