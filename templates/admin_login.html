<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Такси Казанское</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0d2e 50%, #0d1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-icon { font-size: 48px; text-align: center; margin-bottom: 8px; }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 4px;
    }
    .login-sub {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #7c6fff;
    }
    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .btn-submit {
      width: 100%;
      padding: 13px;
      margin-top: 20px;
      background: linear-gradient(135deg, #7c6fff, #a56eff);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1>Панель управления</h1>
    <p class="login-sub">Такси Казанское</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" autofocus placeholder="••••••••" />
      <button type="submit" class="btn-submit">Войти</button>
    </form>
  </div>
</body>
</html>
